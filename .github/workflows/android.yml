name: Android CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          # Gradle 공식 배포에서 wrapper jar 다운로드
          GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties | grep -oP 'gradle-\K[\d.]+(?=-)')
          curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          wget -q "https://repo.maven.apache.org/maven2/org/gradle/gradle-wrapper/${GRADLE_VERSION}/gradle-wrapper-${GRADLE_VERSION}.jar" \
            -O gradle/wrapper/gradle-wrapper.jar 2>/dev/null || \
          (
            echo "Downloading full Gradle distribution for wrapper jar..."
            wget -q "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -O /tmp/gradle.zip
            unzip -j /tmp/gradle.zip "gradle-${GRADLE_VERSION}/lib/plugins/gradle-wrapper-${GRADLE_VERSION}.jar" \
              -d gradle/wrapper/ 2>/dev/null || \
            unzip -jo /tmp/gradle.zip "*/gradle-wrapper*.jar" -d gradle/wrapper/ 2>/dev/null
          )
          ls -la gradle/wrapper/

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShoppingApp-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Print APK info
        if: success()
        run: |
          echo "✅ Build successful!"
          ls -lh app/build/outputs/apk/debug/
